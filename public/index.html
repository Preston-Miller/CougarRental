<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cougar Rental — Rent a Cougar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Cougar Rental</h1>
    <p class="tagline">Rent a cougar for the day. No judgment.</p>
  </header>

  <main>
    <section class="cougar-list">
      <h2>Available Cougars</h2>
      <div id="cougar-grid"></div>
    </section>

    <section class="booking-form">
      <h2>Book a Cougar</h2>
      <form id="booking-form">
        <label>Cougar <select name="cougarId" required></select></label>
        <label>Start Date <input type="date" name="startDate" required></label>
        <label>End Date <input type="date" name="endDate" required></label>
        <label>API Key (for demo) <input type="text" name="apiKey" placeholder="Optional for testing"></label>
        <button type="submit">Book Now</button>
      </form>
      <div id="booking-result"></div>
    </section>
  </main>

  <footer>
    <p>Cougar Rental &copy; 2024 — Security scanner test app</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
